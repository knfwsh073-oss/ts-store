<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Breached</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-green: #003b00;
            --red: #ff0040;
            --bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: none;
        }

        /* كيرسر مخصص */
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s;
            mix-blend-mode: difference;
        }
        .custom-cursor::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--red);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* كانفاس الماتريكس */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.3;
        }

        /* خطوط المسح */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 65, 0.03) 2px,
                rgba(0, 255, 65, 0.03) 4px
            );
        }
        .scanline::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100px;
            background: rgba(0, 255, 65, 0.06);
            animation: scanMove 4s linear infinite;
        }
        @keyframes scanMove {
            0% { top: -100px; }
            100% { top: 100vh; }
        }

        /* المحتوى الرئيسي */
        .main-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* رسالة التهكير الرئيسية */
        .hack-title {
            font-family: 'Cairo', sans-serif;
            font-size: clamp(40px, 10vw, 120px);
            font-weight: 900;
            color: var(--red);
            text-transform: uppercase;
            text-align: center;
            position: relative;
            animation: glitchMain 0.3s infinite;
            text-shadow: 
                0 0 10px var(--red),
                0 0 40px var(--red),
                0 0 80px rgba(255, 0, 64, 0.5);
            opacity: 0;
            transform: scale(3);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hack-title.visible {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes glitchMain {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        .hack-title::before,
        .hack-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .hack-title::before {
            color: #0ff;
            animation: glitchTop 0.2s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }
        .hack-title::after {
            color: var(--neon-green);
            animation: glitchBottom 0.3s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        @keyframes glitchTop {
            0% { transform: translate(0); }
            50% { transform: translate(5px, -2px); }
            100% { transform: translate(0); }
        }
        @keyframes glitchBottom {
            0% { transform: translate(0); }
            50% { transform: translate(-5px, 2px); }
            100% { transform: translate(0); }
        }

        /* الخطوط تحت العنوان */
        .sub-text {
            font-size: clamp(14px, 3vw, 22px);
            color: var(--neon-green);
            margin-top: 20px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s;
            text-shadow: 0 0 10px var(--neon-green);
        }
        .sub-text.visible {
            opacity: 1;
        }

        /* صندوق المعلومات الوهمية */
        .info-box {
            margin-top: 40px;
            border: 1px solid var(--neon-green);
            padding: 25px 35px;
            background: rgba(0, 255, 65, 0.03);
            min-width: 320px;
            max-width: 500px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .info-box.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .info-box::before {
            content: '[ ACCESS GRANTED ]';
            position: absolute;
            top: -12px;
            right: 20px;
            background: var(--bg);
            padding: 0 10px;
            color: var(--neon-green);
            font-size: 12px;
        }

        .info-line {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
            font-size: 14px;
        }
        .info-line:last-child {
            border-bottom: none;
        }
        .info-label {
            color: rgba(0, 255, 65, 0.5);
        }
        .info-value {
            color: var(--red);
            text-shadow: 0 0 5px var(--red);
        }

        /* شريط التقدم الوهمي */
        .progress-section {
            margin-top: 30px;
            width: 100%;
            max-width: 500px;
            opacity: 0;
            transition: opacity 0.8s;
        }
        .progress-section.visible {
            opacity: 1;
        }
        .progress-label {
            font-size: 12px;
            color: rgba(0, 255, 65, 0.6);
            margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 255, 65, 0.1);
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--red);
            box-shadow: 0 0 15px var(--red);
            transition: width 0.3s;
        }

        /* الكونسول في الأسفل */
        .console-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-height: 150px;
            overflow: hidden;
            z-index: 5;
            opacity: 0;
            transition: opacity 1s;
        }
        .console-box.visible {
            opacity: 1;
        }
        .console-line {
            font-size: 11px;
            color: rgba(0, 255, 65, 0.4);
            line-height: 1.6;
            white-space: nowrap;
            overflow: hidden;
        }
        .console-line .cmd {
            color: var(--neon-green);
        }
        .console-line .warn {
            color: var(--red);
        }

        /* الوجه المخيف */
        .skull-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
        .skull-container.flash {
            opacity: 0.15;
        }
        .skull-svg {
            width: 400px;
            height: 400px;
            filter: drop-shadow(0 0 30px var(--red));
        }

        /* تأثير الفلاش الأحمر */
        .red-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--red);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.05s;
        }
        .red-flash.active {
            opacity: 0.3;
        }

        /* رسالة المقلب */
        .prank-reveal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s;
            padding: 20px;
        }
        .prank-reveal.visible {
            opacity: 1;
            pointer-events: all;
        }
        .prank-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0) rotate(-5deg); }
            to { transform: translateY(-15px) rotate(5deg); }
        }
        .prank-text {
            font-family: 'Cairo', sans-serif;
            font-size: clamp(28px, 7vw, 60px);
            font-weight: 900;
            color: var(--neon-green);
            text-align: center;
            text-shadow: 0 0 20px var(--neon-green);
        }
        .prank-sub {
            font-family: 'Cairo', sans-serif;
            font-size: clamp(16px, 3vw, 24px);
            color: rgba(0, 255, 65, 0.5);
            margin-top: 15px;
            text-align: center;
        }

        /* تأثير الضوضاء */
        .noise-overlay {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            animation: noiseMove 0.2s steps(5) infinite;
        }
        @keyframes noiseMove {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-5%, -5%); }
            40% { transform: translate(5%, 5%); }
            60% { transform: translate(-3%, 3%); }
            80% { transform: translate(3%, -3%); }
            100% { transform: translate(0, 0); }
        }

        /* إطار متحرك */
        .border-anim {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(0, 255, 65, 0.15);
            z-index: 4;
            pointer-events: none;
        }
        .border-anim::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            width: 80px;
            height: 2px;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            animation: borderSweep 3s linear infinite;
        }
        @keyframes borderSweep {
            0% { left: 0; top: -1px; }
            25% { left: 100%; top: -1px; width: 2px; height: 80px; }
            50% { left: 100%; top: 100%; width: 80px; height: 2px; }
            75% { left: -1px; top: 100%; width: 2px; height: 80px; }
            100% { left: 0; top: -1px; width: 80px; height: 2px; }
        }

        /* أيقونة التحذير */
        .warning-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .warning-icon.visible {
            opacity: 1;
        }

        /* timestamp */
        .timestamp {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 11px;
            color: rgba(0, 255, 65, 0.3);
            z-index: 5;
        }

        .ip-display {
            position: fixed;
            top: 15px;
            right: 15px;
            font-size: 11px;
            color: rgba(255, 0, 64, 0.4);
            z-index: 5;
        }

        @media (max-width: 600px) {
            .info-box {
                min-width: auto;
                width: 90%;
                padding: 20px;
            }
            .skull-svg {
                width: 250px;
                height: 250px;
            }
        }

        /* تأثير اهتزاز الشاشة */
        @keyframes screenShake {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-5px, -3px); }
            20% { transform: translate(5px, 3px); }
            30% { transform: translate(-3px, 5px); }
            40% { transform: translate(3px, -5px); }
            50% { transform: translate(-5px, 2px); }
            60% { transform: translate(5px, -2px); }
            70% { transform: translate(-2px, -5px); }
            80% { transform: translate(2px, 5px); }
            90% { transform: translate(-3px, 3px); }
        }
        .shake {
            animation: screenShake 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <!-- كيرسر مخصص -->
    <div class="custom-cursor" id="cursor"></div>

    <!-- كانفاس الماتريكس -->
    <canvas id="matrixCanvas"></canvas>

    <!-- تأثيرات بصرية -->
    <div class="scanline"></div>

    <!-- الوجه المخيف -->
    <div class="skull-container" id="skull">

    </div>

    <!-- الطابع الزمني -->
    <div class="timestamp" id="timestamp"></div>
    <div class="ip-display" id="ipDisplay">SESSION: 0x4F2A...</div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content" id="mainContent">
        <svg class="warning-icon" id="warningIcon" viewBox="0 0 100 100" fill="none">
            <polygon points="50,5 95,90 5,90" stroke="#ff0040" stroke-width="3" fill="none"/>
            <line x1="50" y1="30" x2="50" y2="60" stroke="#ff0040" stroke-width="4"/>
            <circle cx="50" cy="75" r="4" fill="#ff0040"/>
        </svg>
        <h1 class="hack-title" id="hackTitle" data-text="تم الاختراق">تم الاختراق</h1>
        <p class="sub-text" id="subText">SYSTEM COMPROMISED — ALL DATA EXPOSED</p>

        <div class="info-box" id="infoBox">
            <div class="info-line">
                <span class="info-label">DEVICE:</span>
                <span class="info-value" id="fakeDevice">Unknown</span>
            </div>
            <div class="info-line">
                <span class="info-label">LOCATION:</span>
                <span class="info-value" id="fakeLocation">Tracking...</span>
            </div>
            <div class="info-line">
                <span class="info-label">FILES ACCESSED:</span>
                <span class="info-value" id="fakeFiles">0</span>
            </div>
            <div class="info-line">
                <span class="info-label">PASSWORDS:</span>
                <span class="info-value">soon</span>
            </div>
            <div class="info-line">
                <span class="info-label">gmail : </span>
                <span class="info-value" id="soon">soon</span>
            </div>
        </div>

        <div class="progress-section" id="progressSection">
            <div class="progress-label" id="progressLabel">EXTRACTING DATA... 0%</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- الكونسول -->
    <div class="console-box" id="consoleBox">
        <div id="consoleLines"></div>
    </div>

    <!-- كشف المقلب -->
    <div class="prank-reveal" id="prankReveal">
        <div class="prank-emoji">😂🤣</div>
        <div class="prank-text">يا قندرة</div>
        <div class="prank-sub">كل خرا</div>
    </div>

    <script>
        // === متغيرات عامة ===
        const cursor = document.getElementById('cursor');
        const hackTitle = document.getElementById('hackTitle');
        const subText = document.getElementById('subText');
        const warningIcon = document.getElementById('warningIcon');
        const infoBox = document.getElementById('infoBox');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressLabel = document.getElementById('progressLabel');
        const consoleBox = document.getElementById('consoleBox');
        const consoleLines = document.getElementById('consoleLines');
        const redFlash = document.getElementById('redFlash');
        const skull = document.getElementById('skull');
        const prankReveal = document.getElementById('prankReveal');
        const timestampEl = document.getElementById('timestamp');
        const mainContent = document.getElementById('mainContent');

        let prankEnded = false;

        // === الكيرسر المخصص ===
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
        });

        // === تأثير الماتريكس ===
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const matrixChars = 'アカサタナハマヤラワ0123456789ABCDEF<>{}[]!@#$%^&*';
        const fontSize = 14;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px Share Tech Mono';

            for (let i = 0; i < drops.length; i++) {
                const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillStyle = Math.random() > 0.98 ? '#ff0040' : '#00ff41';
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        window.addEventListener('resize', () => {
            columns = Math.floor(canvas.width / fontSize);
            drops = Array(columns).fill(1);
        });

        // === الطابع الزمني ===
        function updateTimestamp() {
            const now = new Date();
            timestampEl.textContent = now.toLocaleString('en-US', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            });
        }
        setInterval(updateTimestamp, 1000);
        updateTimestamp();

        // === بيانات وهمية ===
        const fakeDevices = ['pc'];
        const fakeLocations = ['فلسطين , القدس'];

        document.getElementById('fakeDevice').textContent = fakeDevices[Math.floor(Math.random() * fakeDevices.length)];
        document.getElementById('fakeLocation').textContent = fakeLocations[Math.floor(Math.random() * fakeLocations.length)];

        // === أوامر الكونسول الوهمية ===
        const fakeCommands = [
            { cmd: 'root@kali:~# nmap -sV 192.168.1.', warn: false },
            { cmd: 'root@kali:~# ssh admin@target -o StrictHostKeyChecking=no', warn: false },
            { cmd: '[WARNING] Firewall bypassed — port 443 open', warn: true },
            { cmd: 'root@kali:~# mysql -u root -p ********', warn: false },
            { cmd: '[ACCESS] Database dumped: 247 tables exported', warn: true },
            { cmd: 'root@kali:~# wget http://exploit-db/payload.sh', warn: false },
            { cmd: '[INFO] Keylogger deployed successfully', warn: true },
            { cmd: 'root@kali:~# cat /etc/shadow | cut -d: -f1,2', warn: false },
            { cmd: '[CRITICAL] Root privileges obtained', warn: true },
            { cmd: 'root@kali:~# python3 webcam_capture.py --stream', warn: false },
            { cmd: '[ALERT] Camera feed active — recording started', warn: true },
            { cmd: 'root@kali:~# find / -name "*.pdf" -exec cp {} /tmp/stolen', warn: false },
            { cmd: '[INFO] 1,247 files copied to remote server', warn: true },
            { cmd: 'root@kali:~# chromium --headless --screenshot target.png', warn: false },
            { cmd: '[WARNING] WhatsApp database decrypted', warn: true },
            { cmd: 'root@kali:~# crackmapexec smb target -u admin -p password123', warn: false },
            { cmd: '[SUCCESS] All credentials extracted and saved', warn: true },
        ];

        let cmdIndex = 0;
        function addConsoleLine() {
            if (prankEnded) return;
            const line = document.createElement('div');
            line.className = 'console-line';
            const cmdData = fakeCommands[cmdIndex % fakeCommands.length];
            line.innerHTML = cmdData.warn
                ? `<span class="warn">${cmdData.cmd}</span>`
                : `<span class="cmd">${cmdData.cmd}</span>`;
            consoleLines.appendChild(line);
            consoleBox.scrollTop = consoleBox.scrollHeight;

            // نحافظ على آخر 8 أسطر فقط
            while (consoleLines.children.length > 8) {
                consoleLines.removeChild(consoleLines.firstChild);
            }

            cmdIndex++;
        }

        // === فلاش أحمر عشوائي ===
        function triggerFlash() {
            if (prankEnded) return;
            redFlash.classList.add('active');
            mainContent.classList.add('shake');
            skull.classList.add('flash');
            setTimeout(() => {
                redFlash.classList.remove('active');
                mainContent.classList.remove('shake');
                skull.classList.remove('flash');
            }, 150);
        }

        // === تحديث عدد الملفات ===
        let fileCount = 0;
        function updateFiles() {
            if (prankEnded) return;
            fileCount += Math.floor(Math.random() * 50) + 10;
            document.getElementById('fakeFiles').textContent = fileCount.toLocaleString() + ' files';
        }

        // === شريط التقدم ===
        let progress = 0;
        function updateProgress() {
            if (prankEnded) return;
            progress += Math.random() * 3 + 0.5;
            if (progress > 100) progress = 100;
            progressFill.style.width = progress + '%';
            progressLabel.textContent = `EXTRACTING DATA... ${Math.floor(progress)}%`;

            if (progress >= 100) {
                progressLabel.textContent = 'EXTRACTION COMPLETE — UPLOADING TO SERVER...';
                progressLabel.style.color = '#ff0040';
            }
        }

        // === تغيير عنوان الصفحة ===
        const pageTitles = ['تم الاختراق!', 'HACKED!', 'WARNING!', 'YOUR DATA IS MINE', 'مسروق!', 'BREACHED!'];
        let titleIdx = 0;
        function flickerTitle() {
            if (prankEnded) return;
            document.title = pageTitles[titleIdx % pageTitles.length];
            titleIdx++;
        }

        // === تسلسل الأحداث ===
        // ثانية 0: فلاش أول
        setTimeout(() => triggerFlash(), 500);

        // ثانية 1: ظهور أيقونة التحذير
        setTimeout(() => warningIcon.classList.add('visible'), 800);

        // ثانية 1.5: فلاش + عنوان
        setTimeout(() => {
            triggerFlash();
            hackTitle.classList.add('visible');
        }, 1500);

        // ثانية 2.5: النص الفرعي
        setTimeout(() => subText.classList.add('visible'), 2500);

        // ثانية 3: صندوق المعلومات
        setTimeout(() => infoBox.classList.add('visible'), 3000);

        // ثانية 3.5: شريط التقدم
        setTimeout(() => progressSection.classList.add('visible'), 3500);

        // ثانية 4: الكونسول
        setTimeout(() => consoleBox.classList.add('visible'), 4000);

        // === المؤقتات المتكررة ===
        setInterval(addConsoleLine, 800);
        setInterval(updateFiles, 1200);
        setInterval(updateProgress, 500);
        setInterval(flickerTitle, 600);
        setInterval(triggerFlash, 4000);

        // === إنهاء المقلب بعد 15 ثانية ===
        setTimeout(() => {
            prankEnded = true;
            // فلاش أخير كبير
            redFlash.classList.add('active');
            mainContent.classList.add('shake');
            setTimeout(() => {
                redFlash.classList.remove('active');
                mainContent.classList.remove('shake');
            }, 300);

            // إخفاء كل شي
            setTimeout(() => {
                document.getElementById('matrixCanvas').style.opacity = '0';
                document.querySelector('.scanline').style.opacity = '0';
                document.querySelector('.noise-overlay').style.opacity = '0';
                document.querySelector('.border-anim').style.opacity = '0';
                skull.style.opacity = '0';
                mainContent.style.opacity = '0';
                consoleBox.style.opacity = '0';
                document.querySelector('.timestamp').style.opacity = '0';
                document.querySelector('.ip-display').style.opacity = '0';

                // إظهار كشف المقلب
                setTimeout(() => {
                    prankReveal.classList.add('visible');
                    document.title = 'بدي اهينك';
                    document.body.style.cursor = 'default';
                    cursor.style.display = 'none';
                }, 800);
            }, 500);
        }, 15000);
    </script>
</body>
</html>
