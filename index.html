<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>فيديو جديد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e21b3c;
    --accent-glow: rgba(226,27,60,0.4);
    --text: #f0f0f0;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 420px;
  }

  /* === رأس الصفحة === */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .header-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #ff6b81);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    color: #fff;
    flex-shrink: 0;
  }
  .header-info h3 {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
  }
  .header-info span {
    font-size: 11px;
    color: var(--muted);
  }
  .header-badge {
    margin-right: auto;
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
    animation: badgePulse 2s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* === الصورة === */
  .thumbnail-wrapper {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 16/10;
    background: #111;
  }
  .thumbnail-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: blur(1px) brightness(0.7);
    transition: filter 0.4s, transform 0.4s;
  }
  .thumbnail-wrapper:hover img {
    filter: blur(0px) brightness(0.85);
    transform: scale(1.03);
  }

  /* تراكب الصورة */
  .thumbnail-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(0,0,0,0.35);
    transition: background 0.4s;
  }
  .thumbnail-wrapper:hover .thumbnail-overlay {
    background: rgba(0,0,0,0.2);
  }

  .play-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(226,27,60,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px var(--accent-glow);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .thumbnail-wrapper:hover .play-circle {
    transform: scale(1.15);
    box-shadow: 0 0 50px var(--accent-glow);
  }
  .play-circle i {
    font-size: 22px;
    color: #fff;
    margin-right: -3px;
  }

  .duration-badge {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .hd-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    font-weight: 900;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  .blur-notice {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  /* === معلومات الفيديو === */
  .video-info {
    padding: 14px 4px;
  }
  .video-title {
    font-size: 15px;
    font-weight: 900;
    line-height: 1.6;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .video-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .video-meta span i {
    margin-left: 4px;
    font-size: 11px;
  }

  /* === الزر الرئيسي === */
  .enter-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #c41030);
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    box-shadow: 0 4px 25px var(--accent-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .enter-btn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .enter-btn:hover::before { opacity: 1; }
  .enter-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 35px var(--accent-glow);
  }
  .enter-btn:active { transform: translateY(0) scale(0.98); }
  .enter-btn i { font-size: 18px; }

  /* === تحذير === */
  .warning-box {
    margin-top: 14px;
    background: rgba(226,27,60,0.06);
    border: 1px solid rgba(226,27,60,0.15);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .warning-box i {
    color: var(--accent);
    font-size: 14px;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .warning-box p {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* === تعليقات وهمية === */
  .comments-section {
    margin-top: 20px;
  }
  .comments-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .comments-title i { font-size: 12px; }

  .comment {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    animation: fadeIn 0.5s ease forwards;
    opacity: 0;
  }
  .comment:nth-child(2) { animation-delay: 0.2s; }
  .comment:nth-child(3) { animation-delay: 0.4s; }
  .comment:nth-child(4) { animation-delay: 0.6s; }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .comment-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 900;
    color: #fff;
  }
  .comment-body {
    flex: 1;
  }
  .comment-name {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .comment-text {
    font-size: 12px;
    color: #bbb;
    line-height: 1.6;
  }
  .comment-time {
    font-size: 10px;
    color: #555;
    margin-top: 4px;
  }
  .comment-likes {
    font-size: 10px;
    color: #555;
    margin-top: 2px;
  }
  .comment-likes i { margin-left: 3px; font-size: 9px; }

  /* === عدد المشاهدات المباشرة === */
  .live-views {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: livePulse 1.5s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { opacity: 0.6; box-shadow: 0 0 0 6px transparent; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- رأس -->
  <div class="header">
    <div class="header-avatar">X</div>
    <div class="header-info">
      <h3>فيديو مسرّب جديد</h3>
      <span>منذ 23 دقيقة</span>
    </div>
    <div class="header-badge">جديد</div>
  </div>

  <!-- الصورة المصغرة -->
  <div class="thumbnail-wrapper" id="thumbnail">
    <img src="https://z-cdn-media.chatglm.cn/files/5aba5735-69b7-4361-b366-d5520f8581f2.png?auth_key=1874743588-f36c1bec1dc047a394011fe4acd8555b-0-bc0ec01b7ce2fd624c649b9bf9a99647" alt="thumbnail">
    <div class="thumbnail-overlay">
      <div class="play-circle">
        <i class="fas fa-play"></i>
      </div>
      <span class="blur-notice">اضغط لرفع الغشاوة</span>
    </div>
    <span class="duration-badge">03:24</span>
    <span class="hd-badge">HD</span>
  </div>

  <!-- معلومات -->
  <div class="video-info">
    <div class="video-title">فيديو مسرب — لا يُعرض للجميع — محتوى حصري</div>
    <div class="video-meta">
      <span><i class="fas fa-eye"></i> 184K مشاهدة</span>
      <span><i class="fas fa-heart"></i> 12.4K</span>
      <span><i class="fas fa-share"></i> 3.2K</span>
    </div>

    <!-- الزر -->
    <button class="enter-btn" id="enterBtn">
      <i class="fas fa-lock-open"></i>
      دخول الموقع
    </button>

    <!-- تحذير -->
    <div class="warning-box">
      <i class="fas fa-exclamation-triangle"></i>
      <p>هذا المحتوى مقيّد بالعمر. بالضغط على الدخول أنت تؤكد أن عمرك يفوق 18 عاماً وأنك تقبل مسؤولية المشاهدة.</p>
    </div>
  </div>
</div>

<script>
  // الرابط اللي ينقل له
  const redirectURL = "https://youtube.com/shorts/RkZCcteibyc?si=gVPJDRc9sPnygg0M";

  // الضغط على الصورة أو الزر = التحويل
  document.getElementById('thumbnail').addEventListener('click', () => {
    window.location.href = redirectURL;
  });

  document.getElementById('enterBtn').addEventListener('click', () => {
    window.location.href = redirectURL;
  });

  // تحديث عداد المشاهدات بشكل عشوائي
  const liveEl = document.getElementById('liveCount');
  let count = 1247;
  setInterval(() => {
    count += Math.floor(Math.random() * 5) - 2; // بين -2 و +2
    if (count < 1100) count = 1100 + Math.floor(Math.random() * 100);
    liveEl.textContent = count.toLocaleString('ar-EG') + ' شخص يشاهد الآن';
  }, 3000);
</script>

</body>
</html>
